<style>
.eb-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:12px}
.eb-row{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.eb-label{font-size:13px;color:var(--color-text-secondary);min-width:120px}
.eb-val{font-size:14px;font-weight:500;min-width:64px;text-align:right}
.eb-metric{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:12px}
.eb-stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.eb-stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.eb-stat-num{font-size:22px;font-weight:500}
.eb-stat-unit{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.policy-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.pill{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary)}
.pill.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.pill.warn{background:var(--color-background-warning);color:var(--color-text-warning);border-color:var(--color-border-warning)}
.pill.danger{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}
.bar-bg{height:12px;border-radius:6px;background:var(--color-background-secondary);overflow:hidden;margin:6px 0}
.bar-fill{height:100%;border-radius:6px;transition:width .3s,background .3s}
.btn{font-size:13px;padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer}
.btn:hover{background:var(--color-background-secondary)}
</style>

<div class="eb-card">
  <div class="eb-row">
    <span class="eb-label">SLO 可用性</span>
    <input type="range" min="990" max="9999" step="1" value="9990" id="slo-slider" style="flex:1" oninput="recalc()">
    <span class="eb-val" id="slo-disp">99.90%</span>
  </div>
  <div class="eb-row" style="margin-bottom:0">
    <span class="eb-label">計測期間</span>
    <input type="range" min="1" max="4" step="1" value="1" id="period-slider" style="flex:1" oninput="recalc()">
    <span class="eb-val" id="period-disp">30日</span>
  </div>
</div>

<div class="eb-metric">
  <div class="eb-stat">
    <div class="eb-stat-label">総時間</div>
    <div class="eb-stat-num" id="total-min">43,200</div>
    <div class="eb-stat-unit">分</div>
  </div>
  <div class="eb-stat">
    <div class="eb-stat-label">エラーバジェット</div>
    <div class="eb-stat-num" id="budget-min" style="color:var(--color-text-success)">43</div>
    <div class="eb-stat-unit">分 / 期間</div>
  </div>
  <div class="eb-stat">
    <div class="eb-stat-label">残余バジェット</div>
    <div class="eb-stat-num" id="remain-min">43</div>
    <div class="eb-stat-unit" id="remain-pct">100% 残</div>
  </div>
</div>

<div class="eb-card" style="margin-bottom:12px">
  <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px">今月の障害履歴（クリックで追加/消費）</div>
  <div id="incident-list" style="display:flex;flex-direction:column;gap:6px"></div>
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn" onclick="addIncident(5)">障害 +5分</button>
    <button class="btn" onclick="addIncident(15)">障害 +15分</button>
    <button class="btn" onclick="addIncident(60)">障害 +1時間</button>
    <button class="btn" onclick="resetIncidents()">リセット</button>
  </div>
</div>

<div class="eb-card" style="margin-bottom:0">
  <div style="font-size:13px;font-weight:500;margin-bottom:6px">バジェット消費率</div>
  <div class="bar-bg"><div class="bar-fill" id="budget-bar" style="width:0%;background:var(--color-background-success)"></div></div>
  <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">
    <span>0%</span><span id="burn-pct-label">0% 消費</span><span>100%</span>
  </div>
  <div style="font-size:13px;font-weight:500;margin-bottom:6px">ポリシー（自動発動）</div>
  <div class="policy-row" id="policy-pills">
    <span class="pill" id="p0">リリース: 通常通り</span>
    <span class="pill" id="p1">50%超: 要注意 / 週次レビュー</span>
    <span class="pill" id="p2">75%超: リリース凍結</span>
    <span class="pill" id="p3">100%超: 全力リライアビリティ対応</span>
  </div>
</div>

<script>
const PERIODS={1:30,2:60,3:90,4:365};
let incidents=[];

function sloVal(){return parseInt(document.getElementById('slo-slider').value)/10000;}
function periodDays(){return PERIODS[parseInt(document.getElementById('period-slider').value)];}
function totalMin(){return periodDays()*24*60;}
function budgetMin(){return Math.round(totalMin()*(1-sloVal()));}
function consumedMin(){return incidents.reduce((a,b)=>a+b.min,0);}

function recalc(){
  const slo=sloVal();
  const pd=periodDays();
  const tot=totalMin();
  const bud=budgetMin();
  const con=consumedMin();
  const rem=Math.max(0,bud-con);
  const burnPct=bud>0?Math.min(Math.round(con/bud*100),150):0;

  document.getElementById('slo-disp').textContent=(slo*100).toFixed(2)+'%';
  document.getElementById('period-disp').textContent=pd+'日';
  document.getElementById('total-min').textContent=tot.toLocaleString();
  document.getElementById('budget-min').textContent=bud.toLocaleString();
  document.getElementById('remain-min').textContent=rem.toLocaleString();
  document.getElementById('remain-pct').textContent=bud>0?Math.round(rem/bud*100)+'% 残':'—';

  const bar=document.getElementById('budget-bar');
  bar.style.width=Math.min(burnPct,100)+'%';
  if(burnPct>=100){bar.style.background='var(--color-background-danger)';}
  else if(burnPct>=75){bar.style.background='var(--color-background-warning)';}
  else if(burnPct>=50){bar.style.background='var(--color-background-info)';}
  else{bar.style.background='var(--color-background-success)';}

  document.getElementById('burn-pct-label').textContent=burnPct+'% 消費';

  ['p0','p1','p2','p3'].forEach(id=>document.getElementById(id).className='pill');
  if(burnPct>=100){document.getElementById('p3').className='pill danger';}
  else if(burnPct>=75){document.getElementById('p2').className='pill warn';}
  else if(burnPct>=50){document.getElementById('p1').className='pill warn';}
  else{document.getElementById('p0').className='pill active';}
}

function addIncident(min){
  const now=new Date();
  incidents.push({min,label:`障害 ${min}分 (${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')})`});
  renderIncidents();
  recalc();
}

function renderIncidents(){
  const el=document.getElementById('incident-list');
  el.innerHTML='';
  if(incidents.length===0){
    el.innerHTML='<span style="font-size:12px;color:var(--color-text-tertiary)">まだ障害なし</span>';
    return;
  }
  incidents.forEach((inc,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:4px 8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)';
    row.innerHTML=`<span>${inc.label}</span><button onclick="removeIncident(${i})" style="font-size:11px;border:none;background:transparent;color:var(--color-text-secondary);cursor:pointer">削除</button>`;
    el.appendChild(row);
  });
}

function removeIncident(i){incidents.splice(i,1);renderIncidents();recalc();}
function resetIncidents(){incidents=[];renderIncidents();recalc();}

renderIncidents();
recalc();
</script>
